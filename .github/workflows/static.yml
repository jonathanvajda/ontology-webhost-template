name: Publish ontology site

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install documentation dependencies
        run: pip install -r requirements.txt

      - name: Pull ROBOT image
        run: docker pull obolibrary/robot:latest

      - name: Translate ontology-site.yml QA profile to ROBOT query commands
        run: python scripts/run_robot_qa.py --config ontology-site.yml --write-script build/qa/run_robot_queries.sh

      - name: Show ROBOT query commands
        run: cat build/qa/run_robot_queries.sh

      - name: Run SPARQL QA with ROBOT query
        run: docker run --rm -v "$PWD:/work" -w /work obolibrary/robot:latest sh build/qa/run_robot_queries.sh

      - name: Summarize ontology QA
        run: python scripts/run_robot_qa.py --config ontology-site.yml --summarize-only

      - name: Generate MkDocs pages
        run: python scripts/generate_ontology_site.py --config ontology-site.yml

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name == 'push'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
